services:

  # ---------------------------------------------------------------------------
  # MCP Server – exposes demo tools via SSE (HTTP)
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # AI Gateway – policy enforcement + MCP tool injection
  # ---------------------------------------------------------------------------
  aigw:
    image: private-registry.nginx.com/nginx-one-aigw/aigw:latest
    # If you don't have access to the AIGW image, comment out the above line
    # and use the community edition or a compatible gateway.
    restart: unless-stopped
    ports:
      - "4141:4141"
    volumes:
      - ./aigw/aigw.yaml:/etc/aigw/aigw.yaml:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AIGW_JWT_SECRET=${AIGW_JWT_SECRET}
    depends_on:
      mcp-server:
        condition: service_healthy
